<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Private Vault</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

textarea{
width:90%;
height:120px;
margin:10px;
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
}

#notes{
margin-top:20px;
}

.note{
background:#1e293b;
padding:10px;
margin:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>🔐 My Secure Vault</h2>

<textarea id="text" placeholder="Write secret note"></textarea>

<br>

<button onclick="unlock()">Unlock Vault</button>
<button onclick="save()">Save Secret</button>

<div id="notes"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔹 Firebase config
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cryptoKey;

// biometric unlock
async function unlock(){

try{

await navigator.credentials.get({
publicKey:{
challenge:new Uint8Array(32),
timeout:60000,
userVerification:"required"
}
});

cryptoKey = await crypto.subtle.generateKey(
{ name:"AES-GCM", length:256 },
true,
["encrypt","decrypt"]
);

alert("Vault unlocked");

loadNotes();

}
catch(e){
alert("Fingerprint failed");
}

}

// encrypt
async function encrypt(text){

const iv = crypto.getRandomValues(new Uint8Array(12));

const encoded = new TextEncoder().encode(text);

const cipher = await crypto.subtle.encrypt(
{ name:"AES-GCM", iv },
cryptoKey,
encoded
);

return {
data:Array.from(new Uint8Array(cipher)),
iv:Array.from(iv)
};

}

// decrypt
async function decrypt(data,iv){

const decrypted = await crypto.subtle.decrypt(
{ name:"AES-GCM", iv:new Uint8Array(iv)},
cryptoKey,
new Uint8Array(data)
);

return new TextDecoder().decode(decrypted);

}

// save note
async function save(){

if(!cryptoKey){
alert("Unlock vault first");
return;
}

const text = document.getElementById("text").value;

const encrypted = await encrypt(text);

const id = Math.random().toString(36).substring(2);

db.ref("vault/"+id).set(encrypted);

document.getElementById("text").value="";

loadNotes();

}

// load notes
function loadNotes(){

db.ref("vault").once("value", async snap=>{

const container = document.getElementById("notes");

container.innerHTML="";

snap.forEach(async item=>{

const val = item.val();

const text = await decrypt(val.data,val.iv);

const div=document.createElement("div");

div.className="note";

div.innerText=text;

container.appendChild(div);

});

});

}

</script>

</body>
</html>
