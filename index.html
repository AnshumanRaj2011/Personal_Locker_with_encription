<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Vault</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:25px}
button{padding:10px 18px;margin:8px;border:none;border-radius:8px;background:#22c55e;color:white}
textarea{width:90%;height:140px;padding:10px;border-radius:8px;border:none;display:none}
.note{background:#1e293b;margin:8px;padding:10px;border-radius:8px;cursor:pointer}
input{padding:8px;width:80%;margin:10px;border-radius:6px;border:none}
</style>

</head>

<body>

<h2>Secure Vault</h2>

<button onclick="unlock()">Unlock</button>
<button onclick="newNote()">Make New</button>

<br>

<input id="search" placeholder="Search notes" oninput="searchNotes()" style="display:none">

<textarea id="editor"></textarea>
<br>

<button id="saveBtn" onclick="saveNote()" style="display:none">Save</button>
<button id="deleteBtn" onclick="deleteNote()" style="display:none;background:#ef4444">Delete</button>

<div id="notes"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCE7RsYIyLZB_JDkzZapB-XgYzixfFFh9E",
authDomain:"instagram-viewer-d1b90.firebaseapp.com",
databaseURL:"https://instagram-viewer-d1b90-default-rtdb.firebaseio.com",
projectId:"instagram-viewer-d1b90"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let cryptoKey;
let editID=null;
let vaultData={};
let lockTimer;

async function auth(){
return confirm("Authenticate to continue")
}

async function getKey(){

let stored=localStorage.getItem("vaultKey")

if(stored){

const raw=Uint8Array.from(atob(stored),c=>c.charCodeAt(0))

return crypto.subtle.importKey("raw",raw,{name:"AES-GCM"},true,["encrypt","decrypt"])

}

const key=await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"])

const exported=await crypto.subtle.exportKey("raw",key)

localStorage.setItem("vaultKey",btoa(String.fromCharCode(...new Uint8Array(exported))))

return key

}

async function encrypt(text){

const iv=crypto.getRandomValues(new Uint8Array(12))

const enc=new TextEncoder().encode(text)

const cipher=await crypto.subtle.encrypt({name:"AES-GCM",iv},cryptoKey,enc)

return{data:Array.from(new Uint8Array(cipher)),iv:Array.from(iv)}

}

async function decrypt(data,iv){

try{

const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},cryptoKey,new Uint8Array(data))

return new TextDecoder().decode(dec)

}catch{

return "[Cannot decrypt]"

}

}

async function unlock(){

if(!await auth()) return

cryptoKey=await getKey()

document.getElementById("search").style.display="inline"

loadNotes()

resetTimer()

}

function resetTimer(){

clearTimeout(lockTimer)

lockTimer=setTimeout(function(){

alert("Vault locked")

location.reload()

},30000)

}

function newNote(){

document.getElementById("editor").style.display="block"

document.getElementById("saveBtn").style.display="inline"

document.getElementById("deleteBtn").style.display="none"

document.getElementById("editor").value=""

editID=null

resetTimer()

}

function loadNotes(){

db.ref("vault").once("value",async function(snap){

const box=document.getElementById("notes")

box.innerHTML=""

vaultData={}

snap.forEach(async function(item){

const val=item.val()

const text=await decrypt(val.data,val.iv)

vaultData[item.key]=text

showNote(item.key,text)

})

})

}

function showNote(id,text){

const div=document.createElement("div")

div.className="note"

div.innerText=text

div.onclick=function(){

document.getElementById("editor").style.display="block"

document.getElementById("saveBtn").style.display="inline"

document.getElementById("deleteBtn").style.display="inline"

document.getElementById("editor").value=text

editID=id

resetTimer()

}

document.getElementById("notes").appendChild(div)

}

async function saveNote(){

if(!await auth()) return

const text=document.getElementById("editor").value

const enc=await encrypt(text)

const id=editID || Math.random().toString(36).substring(2)

db.ref("vault/"+id).set(enc)

document.getElementById("editor").style.display="none"

loadNotes()

resetTimer()

}

function deleteNote(){

if(!editID) return

if(confirm("Delete this note?")){

db.ref("vault/"+editID).remove()

document.getElementById("editor").style.display="none"

loadNotes()

}

}

function searchNotes(){

const q=document.getElementById("search").value.toLowerCase()

const box=document.getElementById("notes")

box.innerHTML=""

for(let id in vaultData){

if(vaultData[id].toLowerCase().includes(q)){

showNote(id,vaultData[id])

}

}

}

</script>

</body>
</html>
