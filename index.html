<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Vault</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:25px;margin:0}
button{padding:10px 18px;margin:8px;border:none;border-radius:8px;background:#22c55e;color:white}
textarea{width:90%;height:140px;padding:10px;border-radius:8px;border:none;display:none}
.note{background:#1e293b;margin:8px;padding:10px;border-radius:8px;cursor:pointer}
input{padding:8px;width:80%;margin:10px;border-radius:6px;border:none}
</style>

</head>

<body>

<h2>Secure Vault</h2>

<input id="username" placeholder="Username">
<br>
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="newNote()">New Note</button>

<br>

<textarea id="editor"></textarea>
<br>

<button id="saveBtn" onclick="saveNote()" style="display:none">Save</button>

<div id="notes"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyCE7RsYIyLZB_JDkzZapB-XgYzixfFFh9E",
authDomain:"instagram-viewer-d1b90.firebaseapp.com",
databaseURL:"https://instagram-viewer-d1b90-default-rtdb.firebaseio.com",
projectId:"instagram-viewer-d1b90"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let cryptoKey
let currentUser=null

async function hash(text){

const data=new TextEncoder().encode(text)

const hash=await crypto.subtle.digest("SHA-256",data)

return Array.from(new Uint8Array(hash)).join(",")

}

async function deriveKey(password){

const enc=new TextEncoder().encode(password)

const baseKey=await crypto.subtle.importKey(
"raw",
enc,
{name:"PBKDF2"},
false,
["deriveKey"]
)

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:new TextEncoder().encode("vaultsalt"),
iterations:100000,
hash:"SHA-256"
},
baseKey,
{name:"AES-GCM",length:256},
true,
["encrypt","decrypt"]
)

}

async function encrypt(text){

const iv=crypto.getRandomValues(new Uint8Array(12))

const encoded=new TextEncoder().encode(text)

const cipher=await crypto.subtle.encrypt(
{name:"AES-GCM",iv},
cryptoKey,
encoded
)

return{
data:Array.from(new Uint8Array(cipher)),
iv:Array.from(iv)
}

}

async function decrypt(data,iv){

try{

const decrypted=await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
cryptoKey,
new Uint8Array(data)
)

return new TextDecoder().decode(decrypted)

}catch{

return "[Cannot decrypt]"

}

}

async function register(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

if(!username||!password){
alert("Enter username and password")
return
}

const hashPass=await hash(password)

await db.ref("users/"+username+"/password").set(hashPass)

alert("User created")

}

async function login(){

const username=document.getElementById("username").value
const password=document.getElementById("password").value

const snap=await db.ref("users/"+username+"/password").once("value")

if(!snap.exists()){
alert("User not found")
return
}

const stored=snap.val()

const hashPass=await hash(password)

if(stored!==hashPass){
alert("Wrong password")
return
}

cryptoKey=await deriveKey(password)

currentUser=username

loadNotes()

}

function newNote(){

if(!cryptoKey){
alert("Login first")
return
}

document.getElementById("editor").style.display="block"
document.getElementById("saveBtn").style.display="inline"

document.getElementById("editor").value=""

}

async function loadNotes(){

const snap=await db.ref("users/"+currentUser+"/notes").once("value")

const box=document.getElementById("notes")

box.innerHTML=""

if(!snap.exists()) return

const entries=Object.entries(snap.val())

for(const [key,val] of entries){

const text=await decrypt(val.data,val.iv)

const div=document.createElement("div")

div.className="note"

div.innerText=text

box.appendChild(div)

}

}

async function saveNote(){

const text=document.getElementById("editor").value

const encrypted=await encrypt(text)

const id=Math.random().toString(36).substring(2)

await db.ref("users/"+currentUser+"/notes/"+id).set(encrypted)

document.getElementById("editor").style.display="none"

loadNotes()

}

</script>

</body>
</html>
