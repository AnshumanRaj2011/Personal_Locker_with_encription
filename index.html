<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Viewer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<header>
Instagram Viewer
</header>


<div class="searchBox">

<input id="username" placeholder="Enter username">

<button onclick="searchProfile()">Search</button>

</div>


<div id="profile"></div>


<div class="reelsContainer">

<div class="reel">

<video autoplay loop muted>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>

<div class="overlay">

<div class="info">
<h3>@demo_user</h3>
<p>First demo reel</p>
</div>

<div class="actions">
<button class="like">❤️</button>
</div>

</div>

</div>


<div class="reel">

<video autoplay loop muted>
<source src="https://www.w3schools.com/html/movie.mp4">
</video>

<div class="overlay">

<div class="info">
<h3>@demo_user</h3>
<p>Second demo reel</p>
</div>

<div class="actions">
<button class="like">❤️</button>
</div>

</div>

</div>

</div>


<nav class="bottomNav">

<a href="#">Home</a>

<a href="#">Search</a>

<a href="#">Reels</a>

<a href="#">Profile</a>

</nav>


<script src="script.js"></script>

</body>

</html>
